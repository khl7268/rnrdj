<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국어 퀴즈</title>
<style>
:root{
  --bg:#edf2ff;
  --card:#ffffff;
  --ink:#172033;
  --muted:#667085;
  --line:#d9e2f2;
  --primary:#2563eb;
  --primary-dark:#1d4ed8;
  --accent:#fff176;
}

*{box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 20% 10%,#d9f99d 0 120px,transparent 121px),
    radial-gradient(circle at 85% 15%,#bfdbfe 0 150px,transparent 151px),
    linear-gradient(160deg,#f8fbff 0%,var(--bg) 55%,#e0f2fe 100%);
  color:var(--ink);
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:24px;
}

body.notice-visible{
  padding-top:calc(var(--notice-height,48px) + 24px);
}

.notice-bar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:10;
  background:#172033;
  color:#ffffff;
  padding:0;
  font-size:15px;
  font-weight:800;
  box-shadow:0 10px 28px rgba(23,32,51,.18);
  transition:opacity .25s ease,transform .25s ease;
}

.notice-toggle{
  width:100%;
  margin:0;
  padding:12px 18px;
  border:0;
  border-radius:0;
  background:transparent;
  color:#ffffff;
  box-shadow:none;
  font-size:15px;
  font-weight:800;
}

.notice-toggle:hover{
  transform:none;
  background:rgba(255,255,255,.08);
  box-shadow:none;
}

.notice-title{display:block}

.notice-hint{
  display:block;
  margin-top:3px;
  color:#c7d2fe;
  font-size:12px;
  font-weight:700;
}

.notice-detail{
  max-height:0;
  overflow:hidden;
  opacity:0;
  max-width:720px;
  margin:0 auto;
  padding:0 18px;
  color:#e5e7eb;
  font-size:14px;
  font-weight:600;
  text-align:left;
  transition:max-height .28s ease,opacity .22s ease,padding-bottom .28s ease;
}

.notice-bar.open .notice-detail{
  max-height:170px;
  opacity:1;
  padding-bottom:14px;
}

.notice-detail ul{
  margin:0;
  padding-left:20px;
}

.notice-detail li{margin:5px 0}

.notice-bar.hidden{
  display:block;
  opacity:0;
  transform:translateY(-100%);
  pointer-events:none;
}

.card{
  background:rgba(255,255,255,.92);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 24px 70px rgba(37,99,235,.18);
  padding:34px;
  border-radius:24px;
  max-width:720px;
  width:min(100%,720px);
  text-align:center;
}

h1{font-size:42px;margin:0 0 24px}
h2{font-size:24px;margin:0 0 8px;color:var(--primary)}
h3{font-size:20px;margin:0 0 26px;color:var(--muted)}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:22px;
}

.time-panel{
  margin-bottom:16px;
  text-align:left;
}

.time-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
  color:var(--muted);
  font-size:13px;
  font-weight:900;
}

.time-track{
  position:relative;
  height:18px;
  overflow:hidden;
  border-radius:999px;
  background:#e5e7eb;
  box-shadow:inset 0 0 0 1px var(--line);
}

.time-fill{
  width:100%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#22c55e,#2563eb);
  transition:width .25s ease,background .25s ease;
}

.stat{
  padding:12px 10px;
  border-radius:16px;
  background:#f8fafc;
  border:1px solid var(--line);
}

.stat-label{
  display:block;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}

.stat-value{
  display:block;
  margin-top:4px;
  color:var(--ink);
  font-size:25px;
  font-weight:900;
}

.time-low .time-fill{
  background:linear-gradient(90deg,#f97316,#dc2626);
}

.time-low .time-track{
  background:#fee2e2;
  box-shadow:inset 0 0 0 1px #fecaca;
}

.time-low #timeLabel{
  color:#dc2626;
}

button{
  min-width:132px;
  border:0;
  border-radius:14px;
  background:#f1f5f9;
  color:var(--ink);
  padding:16px 22px;
  margin:8px;
  font-size:20px;
  font-weight:700;
  cursor:pointer;
  box-shadow:inset 0 0 0 1px var(--line);
  transition:transform .12s ease,box-shadow .12s ease,background .12s ease,color .12s ease;
}

button:hover{
  transform:translateY(-2px);
  background:#e8f0ff;
  box-shadow:inset 0 0 0 1px #bfd3ff,0 10px 24px rgba(37,99,235,.16);
}

button:active{transform:translateY(0)}

#menu button,#difficulty button:not(.back),#answerButtons button{
  background:var(--primary);
  color:#fff;
  box-shadow:0 12px 24px rgba(37,99,235,.24);
}

#menu button:hover,#difficulty button:not(.back):hover,#answerButtons button:hover{
  background:var(--primary-dark);
}

.mode-picker{
  max-width:430px;
  margin:28px auto 0;
  padding:12px 16px;
  border-radius:18px;
  background:#f8fafc;
  border:1px solid var(--line);
  box-shadow:0 10px 26px rgba(15,23,42,.08);
  user-select:none;
  -webkit-user-select:none;
}

.mode-picker:focus{
  outline:3px solid #bfdbfe;
  outline-offset:3px;
}

.mode-picker-label{
  display:block;
  color:var(--muted);
  font-size:13px;
  font-weight:900;
}

.mode-picker-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-top:8px;
}

.mode-arrow{
  color:#94a3b8;
  font-size:24px;
  font-weight:900;
}

.mode-value{
  color:var(--ink);
  font-size:24px;
  font-weight:900;
}

.mode-picker-hint{
  display:block;
  margin-top:6px;
  color:#64748b;
  font-size:12px;
  font-weight:800;
}

.word{
  display:inline-block;
  min-width:220px;
  margin:22px 0 20px;
  padding:20px 28px;
  border-radius:22px;
  background:#f8fafc;
  border:1px solid var(--line);
  font-size:58px;
  font-weight:900;
  line-height:1.1;
  letter-spacing:0;
}

.example{
  min-height:48px;
  font-size:30px;
  margin:4px 0 28px;
  color:#344054;
}

.highlight{
  background:var(--accent);
  padding:3px 8px;
  border-radius:10px;
  font-weight:900;
  box-shadow:0 3px 0 rgba(245,158,11,.25);
}

.back{
  min-width:auto;
  margin-top:18px;
  padding:11px 16px;
  font-size:16px;
  color:var(--muted);
}

.hidden{display:none}

@media (max-width:520px){
  body{padding:14px}
  body.notice-visible{padding-top:calc(var(--notice-height,44px) + 14px)}
  .notice-toggle{font-size:13px;padding:11px 12px}
  .notice-detail{font-size:13px;padding-left:14px;padding-right:14px}
  .notice-bar.open .notice-detail{padding-bottom:12px}
  .card{padding:26px 18px;border-radius:20px}
  .stats{grid-template-columns:1fr;gap:8px}
  .mode-value{font-size:21px}
  h1{font-size:32px}
  button{width:100%;margin:7px 0;font-size:18px}
  .word{width:100%;min-width:0;font-size:46px}
  .example{font-size:25px}
}
</style>
</head>
<body>
<!-- ===== 공지 글 수정하는 곳 시작 ===== -->
<div id="noticeBar" class="notice-bar hidden">
<button id="noticeToggle" class="notice-toggle" type="button" aria-expanded="false">
<!-- 공지 위에 보이는 제목 -->
<span class="notice-title"><span id="updateTimeText">업데이트됨</span> · 문제 출제 흐름 개선</span>
<!-- 제목 아래 작은 안내 문구 -->
<span class="notice-hint">눌러서 자세히 보기</span>
</button>
<div class="notice-detail">
<ul>
<!-- 공지를 펼쳤을 때 보이는 아래 본문 -->
<li>방금 나온 단어가 바로 다시 나오지 않게 했어요.</li>
<li>같은 정답 유형이 3번 연속 나오지 않게 조정했어요.</li>
<li>형태 퀴즈와 수식언 퀴즈 모두 같은 규칙이 적용돼요.</li>
</ul>
</div>
</div>
<!-- ===== 공지 글 수정하는 곳 끝 ===== -->

<!-- ===== 퀴즈 화면 시작 ===== -->
<div class="card">
<div id="menu">
<h1>🎮 국어 퀴즈</h1>
<button onclick="showDifficulty('form')">형태</button>
<button onclick="showDifficulty('modifier')">수식언</button>
</div>

<div id="difficulty" class="hidden">
<h1 id="difficultyTitle">난이도 선택</h1>
<div id="modePicker" class="mode-picker" tabindex="0" role="button" aria-label="게임 모드 선택">
<span class="mode-picker-label">게임 모드</span>
<div class="mode-picker-row">
<span class="mode-arrow">‹</span>
<span id="modeValue" class="mode-value">일반 모드</span>
<span class="mode-arrow">›</span>
</div>
<span class="mode-picker-hint">PC: ← → / 모바일: 꾹 누르기</span>
</div>
<button onclick="start('easy')">쉬움</button>
<button onclick="start('normal')">보통</button>
<button onclick="start('hard')">어려움</button>
<br>
<button class="back" onclick="showMenu()">메뉴로</button>
</div>

<div id="game" class="hidden">
<div class="time-panel">
<div class="time-top">
<span>남은 시간</span>
<span id="timeLabel">60초</span>
</div>
<div class="time-track">
<div id="timeFill" class="time-fill"></div>
</div>
</div>
<div class="stats">
<div class="stat">
<span class="stat-label">콤보</span>
<span class="stat-value">x<span id="combo">0</span></span>
</div>
<div class="stat">
<span class="stat-label">점수</span>
<span class="stat-value" id="score">0</span>
</div>
<div class="stat">
<span class="stat-label">최고점수</span>
<span class="stat-value" id="high">0</span>
</div>
</div>
<div id="word" class="word"></div>
<div id="example" class="example"></div>
<div id="answerButtons"></div>
</div>
</div>
<!-- ===== 퀴즈 화면 끝 ===== -->

<script src="words.js?v=20260620"></script>
<script>
const noticeBar=document.getElementById("noticeBar");
const noticeToggle=document.getElementById("noticeToggle");
const updateTimeText=document.getElementById("updateTimeText");
const lastUpdatedAt=new Date("2026-06-26T21:23:32+09:00");
const GAME_TIME=60;
const TIME_ATTACK_START=5;
const TIME_ATTACK_BONUS=1;
const BASE_SCORE=4;
const WRONG_TIME_PENALTY=5;

updateTimeAgo();
setInterval(updateTimeAgo,60000);
document.body.classList.add("notice-visible");
noticeBar.classList.remove("hidden");
updateNoticeSpace();

noticeToggle.addEventListener("click", () => {
 const isOpen=noticeBar.classList.toggle("open");
 noticeToggle.setAttribute("aria-expanded",String(isOpen));
 updateNoticeSpace();
});

document.querySelectorAll(".card button").forEach(button => {
 button.addEventListener("click", hideNotice);
});

function hideNotice(){
 noticeBar.classList.add("hidden");
 noticeBar.classList.remove("open");
 document.body.classList.remove("notice-visible");
}

function updateNoticeSpace(){
 document.body.style.setProperty("--notice-height",noticeBar.offsetHeight+"px");
}

window.addEventListener("resize",updateNoticeSpace);

document.addEventListener("keydown", event => {
 if(document.getElementById("difficulty").classList.contains("hidden")) return;
 if(event.key==="ArrowLeft" || event.key==="ArrowRight"){
   event.preventDefault();
   togglePlayMode();
 }
});

const modePicker=document.getElementById("modePicker");

modePicker.addEventListener("mousedown", startLongPress);
modePicker.addEventListener("touchstart", startLongPress);
modePicker.addEventListener("mouseup", cancelLongPress);
modePicker.addEventListener("mouseleave", cancelLongPress);
modePicker.addEventListener("touchend", cancelLongPress);
modePicker.addEventListener("touchcancel", cancelLongPress);

function updateTimeAgo(){
 updateTimeText.textContent="업데이트: "+formatTimeAgo(lastUpdatedAt);
}

function startLongPress(event){
 event.preventDefault();
 cancelLongPress();
 longPressTimer=setTimeout(() => {
   togglePlayMode();
   longPressTimer=null;
 },550);
}

function cancelLongPress(){
 if(longPressTimer){
   clearTimeout(longPressTimer);
   longPressTimer=null;
 }
}

function formatTimeAgo(date){
 const diffMs=Date.now()-date.getTime();
 const diffMinutes=Math.max(0,Math.floor(diffMs/60000));
 if(diffMinutes<1) return "방금 전";
 if(diffMinutes<60) return diffMinutes+"분 전";

 const diffHours=Math.floor(diffMinutes/60);
 if(diffHours<24) return diffHours+"시간 전";

 const diffDays=Math.floor(diffHours/24);
 return diffDays+"일 전";
}

let quizType="form";
let playMode="normal";
let longPressTimer;
let mode="normal";
let current;
let score=0;
let combo=0;
let timeLeft=GAME_TIME;
let timeBarMax=GAME_TIME;
let timerId;
let previousWord="";
let answerHistory=[];

document.getElementById("high").textContent =
localStorage.getItem("highScore") || 0;

function showMenu(){
 stopTimer();
 document.getElementById("menu").classList.remove("hidden");
 document.getElementById("difficulty").classList.add("hidden");
 document.getElementById("game").classList.add("hidden");
 document.body.classList.remove("time-low");
}

function showDifficulty(type){
 quizType=type;
 setPlayMode("normal");
 document.getElementById("difficultyTitle").textContent =
   type==="modifier" ? "수식언 난이도 선택" : "형태 난이도 선택";
 document.getElementById("menu").classList.add("hidden");
 document.getElementById("difficulty").classList.remove("hidden");
}

function setPlayMode(nextMode){
 playMode=nextMode;
 document.getElementById("modeValue").textContent =
   playMode==="timeAttack" ? "타임어택" : "일반 모드";
 document.getElementById("modePicker").setAttribute("aria-label","게임 모드: "+document.getElementById("modeValue").textContent);
}

function togglePlayMode(){
 setPlayMode(playMode==="normal" ? "timeAttack" : "normal");
}

function start(m){
 mode=m;
 score=0;
 combo=0;
 previousWord="";
 answerHistory=[];
 timeLeft=playMode==="timeAttack" ? TIME_ATTACK_START : GAME_TIME;
 timeBarMax=timeLeft;
 document.getElementById("score").textContent=0;
 document.getElementById("combo").textContent=0;
 updateTimeDisplay();
 document.getElementById("menu").classList.add("hidden");
 document.getElementById("difficulty").classList.add("hidden");
 document.getElementById("game").classList.remove("hidden");
 renderAnswerButtons();
 nextQuestion();
 startTimer();
}

function renderAnswerButtons(){
 const buttons = quizType==="modifier"
   ? ["관형사","부사"]
   : ["가변어","불변어"];
 document.getElementById("answerButtons").innerHTML =
   buttons.map(choice => `<button onclick="hideNotice(); answer('${choice}')">${choice}</button>`).join("");
}

function nextQuestion(){
 const list = getQuestionList();
 current = pickQuestion(list);
 previousWord=current[0];
 answerHistory.push(current[1]);
 if(answerHistory.length>2) answerHistory.shift();
 document.getElementById("word").textContent = current[0];
 renderExample();
}

function pickQuestion(list){
 let candidates = list.filter(item => item[0]!==previousWord && !wouldMakeThreeSameAnswers(item[1]));

 if(candidates.length===0){
   candidates = list.filter(item => item[0]!==previousWord);
 }

 if(candidates.length===0){
   candidates = list;
 }

 return candidates[Math.floor(Math.random()*candidates.length)];
}

function wouldMakeThreeSameAnswers(answerType){
 return answerHistory.length===2 &&
   answerHistory[0]===answerType &&
   answerHistory[1]===answerType;
}

function getQuestionList(){
 if(quizType==="modifier"){
   if(mode==="easy") return easyModifierWords;
   if(mode==="normal") return normalModifierWords;
   return hardModifierWords;
 }
 if(mode==="hard") return hardWords;
 return normalWords;
}

function renderExample(){
 const example = document.getElementById("example");
 example.innerHTML = "";

 if(quizType!=="modifier" || mode==="hard" || !current[2]) return;

 const [before, target, after] = current[2];
 example.innerHTML = `${before}<span class="highlight">${target}</span>${after}`;
}

function answer(choice){
 if(choice===current[1]){
   combo += 1;
   score += BASE_SCORE * combo;
   if(playMode==="timeAttack"){
     timeLeft += TIME_ATTACK_BONUS;
     timeBarMax=Math.max(timeBarMax,timeLeft);
     updateTimeDisplay();
   }
   document.getElementById("combo").textContent=combo;
   document.getElementById("score").textContent=score;

   const high = Number(localStorage.getItem("highScore")||0);
   if(score>high){
      localStorage.setItem("highScore",score);
      document.getElementById("high").textContent=score;
   }
   nextQuestion();
 }else{
   combo=0;
   document.getElementById("combo").textContent=combo;
   if(playMode==="timeAttack"){
     score=Math.floor(score/2);
     document.getElementById("score").textContent=score;
   }else{
     timeLeft=Math.max(0,timeLeft-WRONG_TIME_PENALTY);
     updateTimeDisplay();
     if(timeLeft===0) endGame();
   }
 }
}

function startTimer(){
 stopTimer();
 timerId=setInterval(() => {
   timeLeft -= 1;
   updateTimeDisplay();
   if(timeLeft<=0) endGame();
 },1000);
}

function stopTimer(){
 if(timerId){
   clearInterval(timerId);
   timerId=null;
 }
}

function updateTimeDisplay(){
 const safeTime=Math.max(0,timeLeft);
 const percent=(safeTime/timeBarMax)*100;
 document.getElementById("timeLabel").textContent=safeTime+"초";
 document.getElementById("timeFill").style.width=percent+"%";
 document.body.classList.toggle("time-low",timeLeft<=10);
}

function endGame(){
 stopTimer();
 timeLeft=0;
 updateTimeDisplay();
 alert("시간 종료! 점수: "+score);
 document.getElementById("game").classList.add("hidden");
 document.getElementById("difficulty").classList.remove("hidden");
 document.body.classList.remove("time-low");
}
</script>
</body>
</html>
